services:
  postgres:
    image: postgres:16
    container_name: trading-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading_ai}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-trading_ai}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-trading_ai}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-change-me-in-production}
      AUTH_TOKEN_EXPIRY_MINUTES: ${AUTH_TOKEN_EXPIRY_MINUTES:-120}
      DEBUG: ${DEBUG:-false}
      AUTO_CREATE_TABLES: "false"
      RUN_MIGRATIONS_ON_STARTUP: ${RUN_MIGRATIONS_ON_STARTUP:-true}
      NEWS_INTERVAL_SECONDS: ${NEWS_INTERVAL_SECONDS:-5}
      RUNTIME_RECOVERY_DELAY_SECONDS: ${RUNTIME_RECOVERY_DELAY_SECONDS:-2}
      WATCHDOG_INTERVAL_SECONDS: ${WATCHDOG_INTERVAL_SECONDS:-10}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE_PATH: /app/storage/logs/trading-backend.log
      PORT: 8000
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - api_logs:/app/storage/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/live', timeout=3).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  api_logs:
