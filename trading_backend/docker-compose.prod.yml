services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      AUTH_TOKEN_EXPIRY_MINUTES: ${AUTH_TOKEN_EXPIRY_MINUTES:-120}
      DEBUG: "false"
      AUTO_CREATE_TABLES: "false"
      RUN_MIGRATIONS_ON_STARTUP: "true"
      NEWS_INTERVAL_SECONDS: ${NEWS_INTERVAL_SECONDS:-5}
      RUNTIME_RECOVERY_DELAY_SECONDS: ${RUNTIME_RECOVERY_DELAY_SECONDS:-2}
      WATCHDOG_INTERVAL_SECONDS: ${WATCHDOG_INTERVAL_SECONDS:-10}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE_PATH: /app/storage/logs/trading-backend.log
      PORT: 8000
    volumes:
      - api_logs:/app/storage/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/live', timeout=3).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
      - "0.0.0.0:443:443/udp"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  api_logs:
  caddy_data:
  caddy_config:
