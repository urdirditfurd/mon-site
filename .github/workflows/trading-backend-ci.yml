name: trading-backend-ci

on:
  push:
    paths:
      - "trading_backend/**"
      - ".github/workflows/trading-backend-ci.yml"
  pull_request:
    paths:
      - "trading_backend/**"
      - ".github/workflows/trading-backend-ci.yml"

jobs:
  quality-and-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: trading_ai
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d trading_ai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: trading_backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Migration graph check
        run: python scripts/migration_workflow.py check --strict

      - name: Apply migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/trading_ai
        run: alembic -c ./alembic.ini upgrade head

      - name: Compile all python modules
        run: python -m compileall app scripts alembic

      - name: API smoke test
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/trading_ai
          AUTH_SECRET_KEY: ci-secret-key
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8001 &
          APP_PID=$!
          sleep 6
          python - <<'PY'
          import json, urllib.request
          health = json.loads(urllib.request.urlopen("http://127.0.0.1:8001/api/health").read())
          ready = urllib.request.urlopen("http://127.0.0.1:8001/api/health/live").status
          assert health["status"] == "ok"
          assert ready == 200
          PY
          kill $APP_PID
